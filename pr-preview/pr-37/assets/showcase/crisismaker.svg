<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">CrisisMaker animated usage preview</title>
  <desc id="desc">Animated browser mockup showing scenario setup, crisis stimuli, timeline and debrief export.</desc>
  <style>
    :root{--nav-a:#0d3f61;--nav-b:#0f8794;--green:#2ed39b;--paper:#f8fcfd;--line:#d6e8ee;--text:#112b43;--muted:#64788b;--red:#d7282f;--amber:#f0c84b;--violet:#7a4ec9}
    *{box-sizing:border-box}
    text{font-family:Inter,Arial,sans-serif;letter-spacing:0}
    .chrome{fill:#fff;stroke:var(--line);stroke-width:2}
    .top{fill:url(#top)}
    .screen{fill:url(#bg)}
    .panel{fill:#fff;stroke:#e6f0f4;stroke-width:2}
    .tab{fill:rgba(255,255,255,.12)}
    .tab-active{fill:rgba(255,255,255,.22)}
    .small{font-size:16px;font-weight:700;fill:#fff}
    .label{font-size:15px;font-weight:800;fill:var(--text)}
    .hint{font-size:12px;font-weight:700;fill:var(--muted)}
    .mono{font-family:"IBM Plex Mono",Consolas,monospace;font-size:12px;font-weight:700;fill:var(--muted)}
    .line{stroke:#cfdee6;stroke-width:2}
    .tick{fill:#fff;stroke:#cfe2ea;stroke-width:2}
    .stim{filter:url(#shadow)}
    .stim rect{fill:#fff;stroke:#dceaf0;stroke-width:2}
    .cursor{fill:#451dc7}
    .pulse{fill:var(--green)}
    #cursor{animation:cursor 6s ease-in-out infinite}
    #addStim{animation:addStim 6s ease-in-out infinite}
    #routeScenario{animation:routeScenario 6s linear infinite}
    #routeTimeline{animation:routeTimeline 6s linear infinite}
    #routeDebrief{animation:routeDebrief 6s linear infinite}
    #draft1{animation:draft1 6s ease-in-out infinite}
    #draft2{animation:draft2 6s ease-in-out infinite}
    #draft3{animation:draft3 6s ease-in-out infinite}
    #debriefPath{stroke-dasharray:540;stroke-dashoffset:540;animation:path 6s ease-in-out infinite}
    #exportToast{animation:toast 6s ease-in-out infinite}
    @keyframes cursor{0%,100%{transform:translate(180px,330px)}18%{transform:translate(302px,156px)}34%{transform:translate(452px,296px)}54%{transform:translate(674px,190px)}74%{transform:translate(790px,436px)}}
    @keyframes addStim{0%,20%{opacity:0;transform:translateY(16px)}28%,100%{opacity:1;transform:translateY(0)}}
    @keyframes routeScenario{0%,29%,88%,100%{opacity:1}30%,87%{opacity:.42}}
    @keyframes routeTimeline{0%,29%,58%,100%{opacity:.42}30%,57%{opacity:1}}
    @keyframes routeDebrief{0%,58%,87%,100%{opacity:.42}59%,86%{opacity:1}}
    @keyframes draft1{0%,26%{opacity:.25}32%,100%{opacity:1}}
    @keyframes draft2{0%,36%{opacity:.25}42%,100%{opacity:1}}
    @keyframes draft3{0%,46%{opacity:.25}52%,100%{opacity:1}}
    @keyframes path{0%,56%{stroke-dashoffset:540}72%,100%{stroke-dashoffset:0}}
    @keyframes toast{0%,76%,100%{opacity:0;transform:translateY(20px)}82%,94%{opacity:1;transform:translateY(0)}}
  </style>
  <defs>
    <linearGradient id="top" x1="80" x2="880" y1="44" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#0d3f61"/><stop offset=".62" stop-color="#0f8794"/><stop offset="1" stop-color="#249b83"/></linearGradient>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="540"><stop stop-color="#d8ecef"/><stop offset=".48" stop-color="#eaf5f5"/><stop offset="1" stop-color="#f8fbff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0e4153" flood-opacity=".16"/></filter>
  </defs>
  <rect class="screen" width="960" height="540"/>
  <rect class="chrome" x="54" y="42" width="852" height="456"/>
  <rect class="top" x="54" y="42" width="852" height="58"/>
  <circle cx="78" cy="70" r="5" fill="#fff" opacity=".55"/><circle cx="96" cy="70" r="5" fill="#fff" opacity=".55"/><circle cx="114" cy="70" r="5" fill="#fff" opacity=".55"/>
  <text x="145" y="68" class="small">CrisisMaker by Wavestone</text>
  <text x="145" y="84" font-size="10" font-weight="800" fill="#d6f5ef">CRISIS EXERCISE STUDIO</text>
  <g transform="translate(510 52)">
    <rect id="routeScenario" class="tab-active" x="0" y="0" width="92" height="38"/><text x="18" y="24" class="small" font-size="12">Scenario</text>
    <rect id="routeTimeline" class="tab" x="94" y="0" width="92" height="38"/><text x="116" y="24" class="small" font-size="12">Timeline</text>
    <rect id="routeDebrief" class="tab" x="188" y="0" width="88" height="38"/><text x="212" y="24" class="small" font-size="12">Debrief</text>
  </g>
  <rect class="panel" x="86" y="126" width="296" height="332"/>
  <text x="112" y="164" class="label">Scenario setup</text>
  <text x="112" y="188" class="hint">Client, crisis type, actors</text>
  <rect x="112" y="214" width="222" height="28" fill="#f7fbfe" stroke="#d6e8ee"/>
  <rect x="112" y="258" width="170" height="28" fill="#f7fbfe" stroke="#d6e8ee"/>
  <rect x="112" y="302" width="236" height="78" fill="#f7fbfe" stroke="#d6e8ee"/>
  <rect x="112" y="406" width="138" height="34" fill="#13a59e"/>
  <text x="131" y="428" font-size="13" font-weight="800" fill="#fff">Generate injects</text>
  <rect class="panel" x="412" y="126" width="214" height="332"/>
  <text x="438" y="164" class="label">Stimuli</text>
  <line class="line" x1="456" y1="204" x2="456" y2="406"/>
  <circle class="tick" cx="456" cy="222" r="10"/><circle class="tick" cx="456" cy="300" r="10"/><circle class="tick" cx="456" cy="378" r="10"/>
  <g id="draft1" class="stim" transform="translate(480 202)"><rect width="118" height="42"/><text x="14" y="18" class="mono">H+00</text><text x="14" y="33" class="hint">Ransom note</text></g>
  <g id="draft2" class="stim" transform="translate(480 280)"><rect width="118" height="42"/><text x="14" y="18" class="mono">H+45</text><text x="14" y="33" class="hint">Media call</text></g>
  <g id="draft3" class="stim" transform="translate(480 358)"><rect width="118" height="42"/><text x="14" y="18" class="mono">H+90</text><text x="14" y="33" class="hint">Board update</text></g>
  <g id="addStim" class="stim" transform="translate(460 424)"><rect width="144" height="34" fill="#e5f8f5" stroke="#54cdb2"/><text x="18" y="22" font-size="12" font-weight="800" fill="#0b7582">3 stimuli ready</text></g>
  <rect class="panel" x="656" y="126" width="218" height="332"/>
  <text x="682" y="164" class="label">Debrief export</text>
  <text x="682" y="188" class="hint">Hidden story reconstruction</text>
  <path id="debriefPath" d="M690 390 C718 305 734 268 766 252 C802 234 824 194 842 156" fill="none" stroke="#2ed39b" stroke-width="5" stroke-linecap="round"/>
  <circle cx="690" cy="390" r="10" fill="#451dc7"/><circle cx="766" cy="252" r="10" fill="#451dc7"/><circle cx="842" cy="156" r="10" fill="#451dc7"/>
  <rect x="682" y="414" width="128" height="34" fill="#0d3f61"/>
  <text x="701" y="436" font-size="13" font-weight="800" fill="#fff">Export HTML</text>
  <g id="exportToast" transform="translate(596 456)">
    <rect width="278" height="34" fill="#16121f" opacity=".94"/>
    <circle cx="20" cy="17" r="6" class="pulse"/>
    <text x="36" y="22" font-size="12" font-weight="800" fill="#fff">Debrief package generated locally</text>
  </g>
  <path id="cursor" class="cursor" d="M0 0 0 34 9 25 17 43 27 39 18 21 31 21z"/>
</svg>

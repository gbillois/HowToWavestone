<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" aria-labelledby="ct cd">
  <title id="ct">Codex, l'agent IA qui ecrit le code</title>
  <desc id="cd">Mockup anime de l'interface Codex : une idee en langage naturel est saisie, puis l'agent travaille.</desc>
  <style>
    text{font-family:Inter,Arial,sans-serif}
    .shell{fill:#fff;stroke:#d9d4ee;stroke-width:2}
    .bar{fill:#150939}
    .wm{font-size:13px;font-weight:800;fill:#fff}
    .nav{font-size:10px;font-weight:700;fill:#a9a2d8}
    .h{font-size:15px;font-weight:800;fill:#16121f}
    .ph{font-size:12px;font-weight:600;fill:#16121f}
    .lab{font-size:11px;font-weight:700;fill:#6b6580}
    #caret{animation:blink 1.05s steps(1) infinite}
    #shim{animation:shim 2.4s linear infinite}
    @keyframes blink{50%{opacity:0}}
    @keyframes shim{0%{transform:translateX(-120px)}100%{transform:translateX(300px)}}
  </style>
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="300"><stop stop-color="#f1eefb"/><stop offset="1" stop-color="#f8fbff"/></linearGradient>
    <clipPath id="creveal"><rect x="74" y="150" width="0" height="22"><animate attributeName="width" values="0;0;232;232;232;0" keyTimes="0;0.08;0.5;0.8;0.92;1" dur="6s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="cshimclip"><rect x="64" y="214" width="352" height="20"/></clipPath>
    <linearGradient id="cshim" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#451dc7" stop-opacity="0"/><stop offset=".5" stop-color="#451dc7" stop-opacity=".35"/><stop offset="1" stop-color="#451dc7" stop-opacity="0"/></linearGradient>
  </defs>

  <rect width="480" height="300" fill="url(#cbg)"/>
  <rect class="shell" x="20" y="24" width="440" height="252"/>
  <rect class="bar" x="20" y="24" width="440" height="40"/>
  <rect x="34" y="40" width="9" height="9" fill="#5a2be0"/>
  <rect x="48" y="40" width="9" height="9" fill="#36169b"/>
  <rect x="62" y="40" width="9" height="9" fill="#2d1380"/>
  <text x="84" y="49" class="wm">Codex</text>
  <text x="372" y="49" class="nav">Code  App  Docs</text>

  <text x="240" y="108" text-anchor="middle" class="h">What should we code next?</text>

  <rect x="60" y="128" width="360" height="62" fill="#f7f6fc" stroke="#cfc9ec" stroke-width="2"/>
  <text x="74" y="166" class="ph" clip-path="url(#creveal)">build a snake game with cyber quiz</text>
  <rect id="caret" x="74" y="152" width="2" height="17" fill="#451dc7"/>
  <rect x="386" y="154" width="22" height="22" class="bar"/>
  <path d="M397 171v-13M391 164l6-6 6 6" fill="none" stroke="#04f06a" stroke-width="2.4" stroke-linecap="square"/>

  <text x="64" y="210" class="lab">Working on your task…</text>
  <rect x="64" y="214" width="352" height="20" fill="#eceaf6"/>
  <g clip-path="url(#cshimclip)"><rect id="shim" x="64" y="214" width="120" height="20" fill="url(#cshim)"/></g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" aria-labelledby="gt gd">
  <title id="gt">GitHub stocke et partage le code</title>
  <desc id="gd">Mockup anime d'une Pull Request GitHub : le code propose apparait ligne par ligne, pret a etre fusionne.</desc>
  <style>
    text{font-family:Inter,Arial,sans-serif}
    .shell{fill:#fff;stroke:#d9d4ee;stroke-width:2}
    .bar{fill:#150939}
    .wm{font-size:12px;font-weight:800;fill:#fff}
    .pr{font-size:13px;font-weight:800;fill:#16121f}
    .mono{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600}
    .badge{font-size:10px;font-weight:800;fill:#fff}
    .btn{font-size:12px;font-weight:800;fill:#fff}
    #r1{animation:row 5s ease-in-out infinite}
    #r2{animation:row 5s ease-in-out infinite .25s}
    #r3{animation:row 5s ease-in-out infinite .5s}
    #r4{animation:row 5s ease-in-out infinite .75s}
    #merge{animation:pulse 2.2s ease-in-out infinite}
    @keyframes row{0%{opacity:0;transform:translateX(-16px)}14%,100%{opacity:1;transform:translateX(0)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    #merge{transform-origin:240px 250px}
  </style>
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="0" y2="300"><stop stop-color="#f1eefb"/><stop offset="1" stop-color="#f8fbff"/></linearGradient>
  </defs>

  <rect width="480" height="300" fill="url(#gbg)"/>
  <rect class="shell" x="20" y="24" width="440" height="252"/>
  <rect class="bar" x="20" y="24" width="440" height="36"/>
  <circle cx="38" cy="42" r="7" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M38 38v8M34 42h8" stroke="#fff" stroke-width="2"/>
  <text x="54" y="46" class="wm">gbillois / cyber-academy</text>

  <text x="36" y="86" class="pr">Add Cyber Academy Snake game  #1</text>
  <rect x="36" y="96" width="52" height="18" fill="#1f9d57"/>
  <text x="46" y="109" class="badge">Open</text>
  <text x="98" y="109" class="mono" fill="#6b6580">1 commit · 1 file changed</text>

  <rect x="36" y="126" width="408" height="96" fill="#f7f6fc" stroke="#e0dcf0" stroke-width="2"/>
  <g transform="translate(46 138)">
    <g id="r1"><rect x="0" y="0" width="388" height="18" fill="#e6ffed"/><text x="8" y="13" class="mono" fill="#1f7a43">+ &lt;canvas id="board"&gt;&lt;/canvas&gt;</text></g>
    <g id="r2"><rect x="0" y="20" width="388" height="18" fill="#e6ffed"/><text x="8" y="33" class="mono" fill="#1f7a43">+ const snake = new Snake();</text></g>
    <g id="r3"><rect x="0" y="40" width="388" height="18" fill="#ffeef0"/><text x="8" y="53" class="mono" fill="#b3263b">- // todo: game logic</text></g>
    <g id="r4"><rect x="0" y="60" width="388" height="18" fill="#e6ffed"/><text x="8" y="73" class="mono" fill="#1f7a43">+ askCyberQuestion();</text></g>
  </g>

  <g id="merge">
    <rect x="36" y="236" width="180" height="28" fill="#1f9d57"/>
    <path d="M52 250l5 5 9-10" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="square"/>
    <text x="74" y="254" class="btn">Merge pull request</text>
  </g>
  <text x="232" y="254" class="mono" fill="#6b6580">→ deploys to Pages</text>
</svg>

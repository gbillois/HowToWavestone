<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open-Weight AI Trust Deck | Wavestone style</title>
<link rel="stylesheet" href="../wavestonedesign.css">
<style>
:root{--ws-font-mono:'IBM Plex Mono',ui-monospace,Menlo,monospace}*{box-sizing:border-box}body{margin:0;background:#10082d;color:var(--ws-ink-900);font-family:var(--ws-font-body);display:grid;place-items:center;min-height:100vh}.deck{width:min(1280px,100vw);aspect-ratio:16/9;position:relative;box-shadow:0 28px 80px rgba(0,0,0,.45);overflow:hidden}.slide{position:absolute;inset:0;background:#fff;padding:64px 58px 54px;display:none;overflow:hidden}.slide.active{display:block}.dark{background:var(--ws-gradient-brand);color:#fff}.brand{position:absolute;top:28px;left:58px;font-family:var(--ws-font-display);font-weight:700;color:var(--ws-indigo-700);font-size:15px}.dark .brand{color:#fff}.brand:before{content:"";display:inline-block;width:9px;height:9px;background:var(--ws-green-400);margin-right:10px}.page{position:absolute;right:58px;bottom:28px;font:12px var(--ws-font-mono);color:var(--ws-ink-400)}.dark .page{color:rgba(255,255,255,.65)}h1,h2{font-family:var(--ws-font-display);letter-spacing:-.025em;margin:0}h1{font-size:50px;line-height:1.05;max-width:900px}h2{font-size:34px;color:var(--ws-indigo-700);line-height:1.08;margin-top:26px}.dark h2{color:#fff}.msg{font-size:17px;color:var(--ws-ink-500);max-width:1000px;line-height:1.45;margin:16px 0 24px}.dark .msg{color:rgba(255,255,255,.82)}.bar{width:58px;height:5px;background:var(--ws-green-400);margin:18px 0 14px}.table{width:100%;border-collapse:collapse;font-size:13px;line-height:1.25}.table th{background:var(--ws-indigo-600);color:#fff;text-align:left;font-family:var(--ws-font-display);font-size:12px;padding:10px}.table td{border:1px solid var(--ws-ink-100);padding:9px 10px;vertical-align:top}.table tr:nth-child(even) td{background:var(--ws-ink-50)}.dark .table td{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);color:rgba(255,255,255,.86)}.dark .table tr:nth-child(even) td{background:rgba(255,255,255,.12)}.callout{position:absolute;left:58px;right:58px;bottom:68px;background:var(--ws-green-50);border-left:6px solid var(--ws-green-400);padding:14px 18px;font-family:var(--ws-font-display);font-weight:700;color:var(--ws-indigo-900)}.dark .callout{background:var(--ws-green-400);color:var(--ws-indigo-900)}.bullets{display:grid;gap:8px;margin-top:14px;color:var(--ws-ink-700)}.bullets div:before{content:"";display:inline-block;width:8px;height:8px;background:var(--ws-green-400);margin-right:10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}.step{background:var(--ws-ink-50);border-left:5px solid var(--ws-indigo-600);padding:13px 16px;min-height:72px}.step b{color:var(--ws-indigo-700);font-family:var(--ws-font-display)}.nav{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px;background:rgba(21,9,57,.78);padding:8px 12px;border:1px solid rgba(255,255,255,.18)}button{border:1px solid rgba(255,255,255,.28);background:transparent;color:#fff;padding:8px 12px;font-weight:700;cursor:pointer}button:hover{background:var(--ws-green-400);color:var(--ws-indigo-900)}@media print{body{display:block;background:white}.deck{box-shadow:none;width:1280px}.slide{display:block!important;position:relative;page-break-after:always}}
</style>
</head><body>
<div class="deck" id="deck"></div>
<div class="nav"><button id="prev">←</button><button id="next">→</button><button id="pptx">Download PPTX</button><span id="count" style="color:white;font:12px var(--ws-font-mono);align-self:center"></span></div>
<script src="../assets/html2canvas.min.js"></script><script src="../assets/pptxgen.bundle.js"></script>
<script>
const slides=[
{dark:1,t:'Open-Weight Is Not Open Source, and Not Trust by Default',m:'Open-weight gives deployment control, but not transparency, reproducibility or assurance.',headers:['Dimension','Open-weight','Open source'],rows:[['Weights','Available','Usually available'],['Training data','Rarely fully disclosed','Sometimes documented'],['Training code','Not guaranteed','Expected or partially available'],['Reproducibility','Often limited','Higher expectation'],['Governance','Vendor-dependent','Community/licence-dependent'],['Security assurance','Not guaranteed','Not guaranteed either']],c:'Open-weight gives control over execution, not automatic trust in the AI system.'},
{t:'Controlled Hosting Reduces Availability and Confidentiality Risks',m:'Running the model on controlled infrastructure materially reduces two risk families, if the full runtime is controlled.',headers:['Risk','External API model','Controlled open-weight hosting'],rows:[['Availability','Provider outage, API restriction, regional ban, pricing change','Depends mainly on internal infrastructure'],['Confidentiality','Prompts and data may transit through provider systems','Data can remain within controlled environments'],['Sovereignty','Strong external dependency','Better control over location, runtime and operations'],['Cost model','API/token-driven','Infrastructure and capacity-driven']],bul:['Caveat: logs, telemetry, RAG data stores, prompts, plugins, secrets and monitoring tools must also be controlled.']},
{dark:1,t:'The Hard Problem Is Results Integrity',m:'The real risk is whether the full AI system produces reliable, unbiased and non-manipulated results.',headers:['Integrity layer','What can go wrong'],rows:[['Model','Biased training, poisoned data, hidden backdoor, degraded reasoning'],['Packaging','Malicious weights, unsafe serialization, compromised tokenizer, runtime script'],['Prompting','Weak system prompt, prompt injection, policy bypass'],['Context / RAG','Wrong source, stale document, poisoned knowledge base, excessive retrieval'],['Tools / agents','Wrong tool call, excessive privilege, action without approval'],['Output','Hallucination, toxic answer, biased recommendation, unsafe decision'],['Monitoring','Drift not detected, incident not escalated, logs incomplete']],c:'Approve an AI system for a specific use case, data scope and autonomy level — not a model in isolation.'},
{t:'Trust Must Be Graded, Not Assumed',m:'Approval should depend on use case criticality, evidence depth and operational exposure.',headers:['Trust level','Evidence required','Suitable usage'],rows:[['0 — No evidence','Vendor claim only','No production use'],['1 — Documentation','Model card, licence, intended use, limitations','Low-risk experiments'],['2 — Supply chain evidence','Hashes, AI-BOM, source registry, dependency review','Internal productivity'],['3 — Independent testing','Benchmarks, red teaming, bias/toxicity tests, malware scan','Sensitive internal use'],['4 — Contractual assurance','Audit rights, warranties, incident notification','Regulated or business-critical use'],['5 — Continuous assurance','Runtime monitoring, drift detection, revalidation, kill switch','High-impact production']],bul:['Approve by use case.','Maintain a catalogue of authorized models.','Combine both for enterprise scale.']},
{dark:1,t:'A Defense-in-Depth Architecture for Open-Weight AI',m:'Controls must cover model intake, packaging, runtime, data, prompts, tools, outputs and monitoring.',headers:['Layer','Controls'],rows:[['Model intake','Approved source, licence review, model card, AI-BOM, hash validation'],['Artifact security','Malware scan, unsafe format detection, dependency scan, sandboxed loading'],['Runtime isolation','Hardened container, restricted network, secret isolation, no uncontrolled outbound access'],['Data access','Least privilege, RAG ACLs, DLP, classification, retention controls'],['Prompt and tool control','System prompt governance, tool permissioning, MCP gateway, human approval'],['Output control','Guardrails, policy checks, confidence scoring, human validation'],['Continuous monitoring','Drift, anomaly detection, behavioral regression tests, incident playbooks'],['Internal observability','Activation monitoring / “model MRI” for high-risk cases']]},
{t:'Target Operating Model: Who Owns AI Trust?',m:'Large organizations need clear accountability across AI, cyber, legal, data, architecture and business.',headers:['Function','Responsibility'],rows:[['AI / Data Science','Model selection, evaluation, benchmarks, fine-tuning, performance monitoring'],['Cybersecurity','Threat model, supply chain controls, runtime hardening, red teaming'],['Legal / Compliance','Licence, copyright, AI Act, contracts, regulatory exposure'],['Data Office','Data classification, RAG governance, sensitive data controls'],['Architecture / Cloud','Hosting pattern, isolation, scalability, observability'],['Business owner','Use case criticality, acceptable risk, human validation'],['Risk / Internal Control','Approval workflow, evidence retention, periodic reassessment']],c:'A model is approved for a class of usage, data and autonomy — not alone.'},
{dark:1,t:'How the Market Is Tackling the Problem',m:'Big platforms and startups are turning AI trust into a security product category.',headers:['Actor','Posture','What it tells us'],rows:[['Hugging Face + Protect AI','Model scanning at repository scale','Model hubs are becoming AI supply chain control points'],['Microsoft + HiddenLayer','Scanning third-party and open-source models in Azure AI','Curated model catalogues need security gates'],['Palo Alto + Protect AI','Acquisition of Protect AI','AI security is being absorbed into major cyber platforms'],['Cisco + Robust Intelligence','AI Defense, red teaming, AI firewall','AI protection is becoming a platform capability'],['Realm Labs','“Model MRI” / observing AI behavior during inference','Emerging focus on runtime deviation and internal behavior'],['Starseer','Mechanistic interpretability, activation analysis','Glass-box model observability is becoming a serious direction']],bul:['First wave: scan the model package.','Second wave: protect the AI runtime.','Third wave: observe internal model behavior.']},
{t:'Enterprise Methodology: From Intake to Production Approval',m:'Build a repeatable homologation process for models and AI systems.',steps:['Use case intake — purpose, users, data sensitivity, decisions, autonomy level.','Risk tiering — low, medium, high, critical, based on data, impact and action capability.','Model due diligence — licence, provenance, documentation, limitations, known risks.','Supply chain assessment — hashes, AI-BOM, artifact scan, dependencies, tokenizer, runtime scripts.','Security and safety testing — prompt injection, jailbreaks, bias, toxicity, domain tests, red teaming.','Architecture approval — hosting, identity, network, RAG, logging, DLP, secrets, tool access.','Production gate — evidence pack, risk acceptance, monitoring plan, fallback and kill switch.','Continuous assurance — retesting, drift monitoring, incident handling, catalogue update.']},
{dark:1,t:'Implementation Roadmap for a Large Organization',m:'Start with catalogue, tiering and key controls, then industrialize continuous assurance.',headers:['Phase','0-3 months','3-6 months','6-12 months'],rows:[['Governance','Define policy, risk tiers, approval workflow','Create model catalogue','Industrialize review boards and evidence packs'],['Technology','Basic scanning, sandbox loading, approved runtime','AI gateway, DLP, RAG controls, monitoring','Runtime protection, model observability, automated revalidation'],['Organization','Assign AI/cyber/legal/data owners','Create AI security review board','Build AI security operations capability'],['Market integration','Use platform scans and vendor evidence','Add third-party tools where justified','Integrate with SOC, GRC and model registry'],['Priority scope','Critical use cases first','Enterprise productivity and RAG','Agents and autonomous workflows']],c:'Do not ask “Is this model safe?” Ask whether the residual risk is acceptable for this use case, data, autonomy and evidence.'}
];
function table(s){return `<table class="table"><thead><tr>${s.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${s.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
const deck=document.getElementById('deck');deck.innerHTML=slides.map((s,i)=>`<section class="slide ${s.dark?'dark':''} ${i?'':'active'}"><div class="brand">WAVESTONE · AI Security & Trust</div><h2>${s.t}</h2><div class="bar"></div><p class="msg">${s.m}</p>${s.headers?table(s):''}${s.steps?`<div class="grid2">${s.steps.map((x,j)=>`<div class="step"><b>${String(j+1).padStart(2,'0')}</b> ${x}</div>`).join('')}</div>`:''}${s.bul?`<div class="bullets">${s.bul.map(x=>`<div>${x}</div>`).join('')}</div>`:''}${s.c?`<div class="callout">${s.c}</div>`:''}<div class="page">${String(i+1).padStart(2,'0')} / 09</div></section>`).join('');
let cur=0,els=[...document.querySelectorAll('.slide')],count=document.getElementById('count');function go(n){cur=Math.max(0,Math.min(els.length-1,n));els.forEach((e,i)=>e.classList.toggle('active',i===cur));count.textContent=`${cur+1} / ${els.length}`}prev.onclick=()=>go(cur-1);next.onclick=()=>go(cur+1);document.onkeydown=e=>{if(e.key==='ArrowRight')go(cur+1);if(e.key==='ArrowLeft')go(cur-1)};go(0);
pptx.onclick=async()=>{const pptx=new PptxGenJS();pptx.layout='LAYOUT_WIDE';const old=cur;document.body.classList.add('exporting');for(let i=0;i<els.length;i++){go(i);await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));const canvas=await html2canvas(els[i],{scale:2,backgroundColor:null,logging:false});pptx.addSlide().addImage({data:canvas.toDataURL('image/png'),x:0,y:0,w:13.333,h:7.5});}go(old);pptx.writeFile({fileName:'open-weight-ai-trust.pptx'});};
</script></body></html>
